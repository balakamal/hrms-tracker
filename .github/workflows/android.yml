name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.0'

    - name: Build with Gradle
      run: |
        cd android
        gradle assembleDebug > build_log.txt 2>&1

    - name: Upload Build Log on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: gradle-build-log
        path: android/build_log.txt

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: hrms-insights-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Commit and Push APK to Repo
      run: |
        mkdir -p builds
        cp android/app/build/outputs/apk/debug/app-debug.apk builds/app-debug.apk
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add builds/app-debug.apk
        git commit -m "build: compile and update app-debug.apk [skip ci]" || true
        git push origin main
